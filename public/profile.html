<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Cheka</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    .container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
    .back-btn{display:inline-block;color:#888;text-decoration:none;font-size:.85rem;margin-bottom:1.5rem}
    .profile-card{background:#111;border:1px solid #2a2a2a;border-radius:16px;padding:2rem;margin-bottom:2rem}
    .profile-top{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem}
    .avatar{width:80px;height:80px;border-radius:50%;background:#e63212;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:2rem;font-weight:900;color:#f5f5f5;flex-shrink:0}
    .profile-info h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:900}
    .profile-info p{color:#888;font-size:.85rem;margin-top:.25rem}
    .profile-stats{display:flex;gap:2rem;padding-top:1.5rem;border-top:1px solid #2a2a2a}
    .stat h3{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:900;color:#e63212}
    .stat p{color:#888;font-size:.75rem;margin-top:.2rem}
    .section-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:900;margin-bottom:1.5rem}
    .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem}
    .video-card{background:#111;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden;transition:border-color .2s}
    .video-card:hover{border-color:#e63212}
    .video-thumb{position:relative;padding-bottom:56.25%;height:0;overflow:hidden}
    .video-thumb iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
    .video-details{padding:1rem}
    .video-details h3{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700}
    .video-meta{display:flex;justify-content:space-between;margin-top:.5rem}
    .likes{color:#e63212;font-size:.8rem}
    .date{color:#555;font-size:.75rem}
    .empty-state{text-align:center;padding:3rem;color:#888;grid-column:1/-1}
    .empty-state h2{font-family:'Syne',sans-serif;color:#f5f5f5;margin-bottom:.5rem}
    .go-feed{display:inline-block;background:#e63212;color:#f5f5f5;border-radius:8px;padding:.7rem 1.5rem;text-decoration:none;font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;margin-top:1rem}
    .loading{color:#888;font-size:.85rem;text-align:center;padding:2rem}
    .badge{display:inline-block;background:#1db954;color:#000;border-radius:20px;padding:.2rem .75rem;font-size:.75rem;font-weight:700;margin-top:.5rem}
  </style>
</head>
<body>
  <nav>
    <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit;">😂 Cheka</a></div>
    <div class="nav-links">
      <a href="feed.html">Watch</a>
      <a href="profile.html" id="navUser" style="color:#1db954;"></a>
      <a href="#" onclick="logout();return false;" style="color:#e63212;">Logout</a>
    </div>
  </nav>

  <div class="container">
    <a href="feed.html" class="back-btn">← Back to Feed</a>

    <div class="profile-card">
      <div class="profile-top">
        <div class="avatar" id="avatar">?</div>
        <div class="profile-info">
          <h1 id="profileName">Loading...</h1>
          <p id="profileEmail"></p>
          <span class="badge">🎬 Creator</span>
        </div>
      </div>
      <div class="profile-stats">
        <div class="stat">
          <h3 id="totalVideos">0</h3>
          <p>Videos</p>
        </div>
        <div class="stat">
          <h3 id="totalLikes">0</h3>
          <p>Total Likes</p>
        </div>
        <div class="stat">
          <h3 id="totalComments">0</h3>
          <p>Comments</p>
        </div>
      </div>
    </div>

    <div class="section-title">My Videos 🎬</div>
    <div id="myVideos" class="video-grid">
      <div class="loading">Loading your videos...</div>
    </div>
  </div>

  <script>
    const API='https://cheka-backend.onrender.com';
    const token=localStorage.getItem('cheka_token');
    const user=JSON.parse(localStorage.getItem('cheka_user')||'{}');

    if(!token)window.location.href='login.html';

    document.getElementById('navUser').textContent=user.username?'@'+user.username:'';
    document.getElementById('profileName').textContent='@'+user.username;
    document.getElementById('profileEmail').textContent=user.email;
    document.getElementById('avatar').textContent=user.username?user.username[0].toUpperCase():'?';

    async function loadMyVideos(){
      try{
        const res=await fetch(API+'/api/videos');
        const all=await res.json();
        const mine=all.filter(v=>v.creatorName===user.username);

        document.getElementById('totalVideos').textContent=mine.length;
        document.getElementById('totalLikes').textContent=mine.reduce((s,v)=>s+v.likes,0);

        // Load comment counts
        let totalComments=0;
        await Promise.all(mine.map(async v=>{
          try{
            const r=await fetch(API+'/api/comments/'+v._id);
            const c=await r.json();
            totalComments+=c.length;
          }catch{}
        }));
        document.getElementById('totalComments').textContent=totalComments;

        const grid=document.getElementById('myVideos');
        if(!mine.length){
          grid.innerHTML=`
            <div class="empty-state">
              <h2>No videos yet 😅</h2>
              <p>Submit your first funny video to the feed!</p>
              <a href="feed.html" class="go-feed">Go to Feed</a>
            </div>`;
          return;
        }

        grid.innerHTML=mine.map(v=>`
          <div class="video-card">
            <div class="video-thumb">
              <iframe src="https://www.youtube.com/embed/${v.youtubeId}" allowfullscreen loading="lazy"></iframe>
            </div>
            <div class="video-details">
              <h3>${v.title}</h3>
              <div class="video-meta">
                <span class="date">${new Date(v.createdAt).toLocaleDateString()}</span>
                <span class="likes">❤️ ${v.likes}</span>
              </div>
            </div>
          </div>
        `).join('');
      }catch{
        document.getElementById('myVideos').innerHTML='<div class="loading">Could not load videos.</div>';
      }
    }

    function logout(){
      localStorage.removeItem('cheka_token');
      localStorage.removeItem('cheka_user');
      window.location.href='index.html';
    }

    loadMyVideos();
  </script>
</body>
</html>
