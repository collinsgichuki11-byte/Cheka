<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Cheka</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    .profile-container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .profile-card {
      background: #111; border: 1px solid #2a2a2a; border-radius: 16px;
      padding: 2rem; margin-bottom: 2rem; display: flex;
      align-items: center; gap: 1.5rem;
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: #e63212; display: flex; align-items: center;
      justify-content: center; font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 900; color: #f5f5f5;
      flex-shrink: 0;
    }
    .profile-info h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 900; }
    .profile-info p { color: #888; font-size: 0.85rem; margin-top: 0.25rem; }
    .profile-stats { display: flex; gap: 2rem; margin-top: 1rem; }
    .profile-stat h3 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 900; color: #e63212; }
    .profile-stat p { color: #888; font-size: 0.75rem; }
    .section-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 900; margin-bottom: 1.5rem; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
    .video-card { background: #111; border: 1px solid #2a2a2a; border-radius: 12px; overflow: hidden; }
    .video-card:hover { border-color: #e63212; }
    .video-thumb { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
    .video-thumb iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .video-details { padding: 1rem; }
    .video-details h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; }
    .video-meta { display: flex; justify-content: space-between; margin-top: 0.5rem; }
    .likes { color: #e63212; font-size: 0.8rem; }
    .empty-state { text-align: center; padding: 3rem; color: #888; }
    .empty-state h2 { font-family: 'Syne', sans-serif; color: #f5f5f5; margin-bottom: 0.5rem; }
    .submit-btn {
      background: #e63212; color: #f5f5f5; border: none; border-radius: 8px;
      padding: 0.7rem 1.5rem; font-family: 'Space Mono', monospace;
      font-size: 0.85rem; font-weight: 700; cursor: pointer; margin-top: 1rem;
      display: inline-block; text-decoration: none;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit;">😂 Cheka</a></div>
    <div class="nav-links">
      <a href="feed.html">Watch</a>
      <a href="profile.html" id="navUser" style="color:#1db954;"></a>
      <a href="#" onclick="logout()" style="color:#e63212;">Logout</a>
    </div>
  </nav>

  <div class="profile-container">
    <div class="profile-card">
      <div class="avatar" id="avatar">?</div>
      <div class="profile-info">
        <h1 id="profileName">Loading...</h1>
        <p id="profileEmail"></p>
        <div class="profile-stats">
          <div class="profile-stat">
            <h3 id="totalVideos">0</h3>
            <p>Videos</p>
          </div>
          <div class="profile-stat">
            <h3 id="totalLikes">0</h3>
            <p>Total Likes</p>
          </div>
        </div>
      </div>
    </div>

    <div class="section-title">My Videos 🎬</div>
    <div id="myVideos" class="video-grid">
      <div style="color:#888;font-size:0.85rem;">Loading...</div>
    </div>
  </div>

  <script>
    const API = 'https://cheka-backend.onrender.com';
    const token = localStorage.getItem('cheka_token');
    const user = JSON.parse(localStorage.getItem('cheka_user') || '{}');

    if (!token) window.location.href = 'login.html';

    document.getElementById('navUser').textContent = user.username ? `@${user.username}` : '';
    document.getElementById('profileName').textContent = `@${user.username}`;
    document.getElementById('profileEmail').textContent = user.email;
    document.getElementById('avatar').textContent = user.username ? user.username[0].toUpperCase() : '?';

    async function loadMyVideos() {
      try {
        const res = await fetch(`${API}/api/videos`);
        const all = await res.json();
        const mine = all.filter(v => v.creatorName === user.username);

        document.getElementById('totalVideos').textContent = mine.length;
        const totalLikes = mine.reduce((sum, v) => sum + v.likes, 0);
        document.getElementById('totalLikes').textContent = totalLikes;

        const grid = document.getElementById('myVideos');

        if (mine.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <h2>No videos yet 😅</h2>
              <p>Submit your first funny video!</p>
              <a href="feed.html" class="submit-btn">Go to Feed</a>
            </div>`;
          return;
        }

        grid.innerHTML = mine.map(v => `
          <div class="video-card">
            <div class="video-thumb">
              <iframe src="https://www.youtube.com/embed/${v.youtubeId}"
                allowfullscreen loading="lazy"></iframe>
            </div>
            <div class="video-details">
              <h3>${v.title}</h3>
              <div class="video-meta">
                <span style="color:#888;font-size:0.75rem;">${new Date(v.createdAt).toLocaleDateString()}</span>
                <span class="likes">❤️ ${v.likes}</span>
              </div>
            </div>
          </div>
        `).join('');
      } catch {
        document.getElementById('myVideos').innerHTML = '<div style="color:#888">Could not load videos.</div>';
      }
    }

    function logout() {
      localStorage.removeItem('cheka_token');
      localStorage.removeItem('cheka_user');
      window.location.href = 'index.html';
    }

    loadMyVideos();
  </script>
</body>
</html>
