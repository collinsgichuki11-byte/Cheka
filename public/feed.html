<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch — Cheka</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    .feed-container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
    .feed-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
    .feed-header h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:900}
    .search-bar{margin-bottom:2rem}
    .search-bar input{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:.75rem 1rem;color:#f5f5f5;font-family:'Space Mono',monospace;font-size:.85rem;outline:none;box-sizing:border-box}
    .submit-btn{background:#e63212;color:#f5f5f5;border:none;border-radius:8px;padding:.7rem 1.2rem;font-family:'Space Mono',monospace;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap}
    .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
    .video-card{background:#111;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden}
    .video-thumb{position:relative;padding-bottom:56.25%;height:0;overflow:hidden}
    .video-thumb iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
    .video-details{padding:1rem}
    .video-details h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.4rem}
    .video-actions{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem}
    .creator-tag{color:#1db954;font-size:.75rem}
    .action-btns{display:flex;gap:.5rem}
    .act-btn{background:transparent;border:1px solid #2a2a2a;color:#f5f5f5;border-radius:20px;padding:.4rem .9rem;font-family:'Space Mono',monospace;font-size:.75rem;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
    .act-btn.liked{border-color:#e63212;color:#e63212}
    .loading{text-align:center;padding:4rem;color:#888;font-size:.85rem;grid-column:1/-1}
    .empty-state{text-align:center;padding:4rem 2rem;color:#888;grid-column:1/-1}
    .empty-state h2{font-family:'Syne',sans-serif;font-size:1.5rem;color:#f5f5f5}
    .back-btn{display:inline-block;color:#888;text-decoration:none;font-size:.85rem;margin-bottom:1.5rem}
    /* Comments Modal */
    .cm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:2000;display:none;flex-direction:column}
    .cm-overlay.open{display:flex}
    .cm-header{display:flex;justify-content:space-between;align-items:center;padding:1.5rem;border-bottom:1px solid #2a2a2a;flex-shrink:0}
    .cm-header h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:900}
    .cm-close{background:#2a2a2a;border:none;color:#f5f5f5;border-radius:8px;padding:.5rem 1rem;font-family:'Space Mono',monospace;cursor:pointer;font-size:.85rem;touch-action:manipulation}
    .cm-list{flex:1;overflow-y:auto;padding:1rem 1.5rem}
    .cm-input-area{padding:1rem 1.5rem;border-top:1px solid #2a2a2a;background:#0a0a0a;flex-shrink:0}
    .cm-input-row{display:flex;gap:.5rem}
    .cm-input{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:.8rem 1rem;color:#f5f5f5;font-family:'Space Mono',monospace;font-size:.9rem;outline:none;min-width:0}
    .cm-input:focus{border-color:#e63212}
    .cm-send{background:#e63212;color:#f5f5f5;border:none;border-radius:8px;padding:.8rem 1.2rem;font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;cursor:pointer;touch-action:manipulation;flex-shrink:0}
    .comment-item{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #1f1f1f}
    .comment-item:last-child{border-bottom:none}
    .comment-author{color:#1db954;font-size:.8rem;margin-bottom:.3rem}
    .comment-text{font-size:.9rem;color:#f5f5f5;line-height:1.5}
    .comment-time{font-size:.7rem;color:#555;margin-top:.3rem}
    .no-comments{color:#555;font-size:.85rem;text-align:center;padding:2rem}
    /* Submit Modal */
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:1000;padding:1.5rem;box-sizing:border-box}
    .modal-overlay.active{display:flex}
    .modal{background:#111;border:1px solid #2a2a2a;border-radius:16px;padding:2rem;width:100%;max-width:460px}
    .modal h2{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:900;margin-bottom:1.5rem}
    .form-group{margin-bottom:1.2rem}
    .form-group label{display:block;font-size:.8rem;color:#888;margin-bottom:.4rem}
    .form-group input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:.85rem 1rem;color:#f5f5f5;font-family:'Space Mono',monospace;font-size:.85rem;outline:none;box-sizing:border-box}
    .form-group input:focus{border-color:#e63212}
    .modal-btns{display:flex;gap:1rem;margin-top:1rem}
    .modal-submit{flex:1;background:#e63212;color:#f5f5f5;border:none;border-radius:8px;padding:.85rem;font-family:'Space Mono',monospace;font-weight:700;cursor:pointer}
    .modal-cancel{background:transparent;color:#888;border:1px solid #2a2a2a;border-radius:8px;padding:.85rem 1.2rem;font-family:'Space Mono',monospace;cursor:pointer}
    .error-msg{background:rgba(230,50,18,.1);border:1px solid rgba(230,50,18,.3);color:#e63212;padding:.75rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;display:none}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1db954;color:#000;padding:.75rem 1.5rem;border-radius:8px;font-size:.85rem;font-weight:700;display:none;z-index:9999}
    .toast.show{display:block}
  </style>
</head>
<body>
  <nav>
    <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit;">😂 Cheka</a></div>
    <div class="nav-links">
      <a href="feed.html">Watch</a>
      <a href="profile.html" id="navUser" style="color:#1db954;"></a>
      <a href="#" onclick="logout();return false;" style="color:#e63212;">Logout</a>
    </div>
  </nav>

  <div class="feed-container">
    <a href="index.html" class="back-btn">← Home</a>
    <div class="feed-header">
      <h1>😂 What's Funny Today</h1>
      <button class="submit-btn" onclick="openModal()">+ Submit</button>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search funny videos..." oninput="filterVideos()"/>
    </div>
    <div id="videoGrid" class="video-grid">
      <div class="loading">Loading funny content... 😂</div>
    </div>
  </div>

  <!-- Comments Modal (outside all cards) -->
  <div class="cm-overlay" id="cmOverlay">
    <div class="cm-header">
      <h2>💬 Comments</h2>
      <button class="cm-close" onclick="closeComments()">✕ Close</button>
    </div>
    <div class="cm-list" id="cmList">
      <div class="no-comments">Loading...</div>
    </div>
    <div class="cm-input-area">
      <div class="cm-input-row">
        <input class="cm-input" id="cmInput" type="text" placeholder="Say something funny..."/>
        <button class="cm-send" id="cmSend">Send</button>
      </div>
    </div>
  </div>

  <!-- Submit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Submit a Video 🎬</h2>
      <div class="error-msg" id="modalError"></div>
      <div class="form-group">
        <label>Video Title</label>
        <input type="text" id="videoTitle" placeholder="e.g. When matatu conductor..."/>
      </div>
      <div class="form-group">
        <label>YouTube URL</label>
        <input type="text" id="videoUrl" placeholder="https://youtube.com/watch?v=..."/>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-submit" onclick="submitVideo()">Submit</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API='https://cheka-backend.onrender.com';
    const token=localStorage.getItem('cheka_token');
    const user=JSON.parse(localStorage.getItem('cheka_user')||'{}');
    let allVideos=[];
    let activeVideoId=null;
    const likedVideos=new Set(JSON.parse(localStorage.getItem('cheka_liked')||'[]'));

    if(!token)window.location.href='login.html';
    document.getElementById('navUser').textContent=user.username?'@'+user.username:'';

    // Wire up comment send button ONCE here outside any card
    document.getElementById('cmSend').addEventListener('click',sendComment);
    document.getElementById('cmInput').addEventListener('keydown',function(e){
      if(e.key==='Enter')sendComment();
    });

    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2500);
    }

    function timeAgo(date){
      const d=(Date.now()-new Date(date))/1000;
      if(d<60)return 'just now';
      if(d<3600)return Math.floor(d/60)+'m ago';
      if(d<86400)return Math.floor(d/3600)+'h ago';
      return Math.floor(d/86400)+'d ago';
    }

    async function loadVideos(){
      try{
        const res=await fetch(API+'/api/videos');
        allVideos=await res.json();
        renderVideos(allVideos);
      }catch{
        document.getElementById('videoGrid').innerHTML='<div class="loading">Could not load videos.</div>';
      }
    }

    function renderVideos(videos){
      const grid=document.getElementById('videoGrid');
      if(!videos.length){
        grid.innerHTML='<div class="empty-state"><h2>No videos yet 😅</h2><p>Be the first!</p></div>';
        return;
      }
      grid.innerHTML=videos.map(v=>`
        <div class="video-card">
          <div class="video-thumb">
            <iframe src="https://www.youtube.com/embed/${v.youtubeId}" allowfullscreen loading="lazy"></iframe>
          </div>
          <div class="video-details">
            <h3>${v.title}</h3>
            <div class="video-actions">
              <span class="creator-tag">@${v.creatorName}</span>
              <div class="action-btns">
                <button class="act-btn ${likedVideos.has(v._id)?'liked':''}" id="like-${v._id}" onclick="likeVideo('${v._id}')">${likedVideos.has(v._id)?'❤️':'🤍'} ${v.likes}</button>
                <button class="act-btn" onclick="openComments('${v._id}')">💬</button>
                <button class="act-btn" onclick="shareVideo('${v._id}','${v.title}')">🔗</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterVideos(){
      const q=document.getElementById('searchInput').value.toLowerCase();
      renderVideos(allVideos.filter(v=>v.title.toLowerCase().includes(q)||v.creatorName.toLowerCase().includes(q)));
    }

    async function likeVideo(id){
      try{
        const res=await fetch(API+'/api/videos/'+id+'/like',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({userId:user.id})
        });
        const data=await res.json();
        const btn=document.getElementById('like-'+id);
        if(data.liked){
          likedVideos.add(id);
          btn.classList.add('liked');
          btn.textContent='❤️ '+data.likes;
        }else{
          likedVideos.delete(id);
          btn.classList.remove('liked');
          btn.textContent='🤍 '+data.likes;
        }
        localStorage.setItem('cheka_liked',JSON.stringify([...likedVideos]));
      }catch{}
    }

    async function openComments(videoId){
      activeVideoId=videoId;
      document.getElementById('cmOverlay').classList.add('open');
      document.getElementById('cmInput').value='';
      document.getElementById('cmList').innerHTML='<div class="no-comments">Loading...</div>';
      await loadComments(videoId);
    }

    function closeComments(){
      document.getElementById('cmOverlay').classList.remove('open');
      activeVideoId=null;
    }

    async function loadComments(videoId){
      try{
        const res=await fetch(API+'/api/comments/'+videoId);
        const comments=await res.json();
        const list=document.getElementById('cmList');
        if(!comments.length){
          list.innerHTML='<div class="no-comments">No comments yet. Be first! 😄</div>';
          return;
        }
        list.innerHTML=comments.map(c=>`
          <div class="comment-item">
            <div class="comment-author">@${c.username}</div>
            <div class="comment-text">${c.text}</div>
            <div class="comment-time">${timeAgo(c.createdAt)}</div>
          </div>
        `).join('');
      }catch{}
    }

    async function sendComment(){
      if(!activeVideoId)return;
      const input=document.getElementById('cmInput');
      const text=input.value.trim();
      if(!text){showToast('Type something first 😄');return;}
      try{
        const res=await fetch(API+'/api/comments/'+activeVideoId,{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
          body:JSON.stringify({text,username:user.username})
        });
        if(res.ok){
          input.value='';
          await loadComments(activeVideoId);
          showToast('Comment posted! 😄');
        }
      }catch{showToast('Could not post comment');}
    }

    function shareVideo(id,title){
      const url=window.location.origin+'/feed.html#'+id;
      if(navigator.share)navigator.share({title:'Cheka: '+title,url});
      else{navigator.clipboard.writeText(url);showToast('Link copied! 🔗');}
    }

    function openModal(){document.getElementById('modalOverlay').classList.add('active');}
    function closeModal(){
      document.getElementById('modalOverlay').classList.remove('active');
      document.getElementById('modalError').style.display='none';
    }

    async function submitVideo(){
      const title=document.getElementById('videoTitle').value.trim();
      const youtubeUrl=document.getElementById('videoUrl').value.trim();
      const errorMsg=document.getElementById('modalError');
      errorMsg.style.display='none';
      if(!title||!youtubeUrl){errorMsg.textContent='Please fill in all fields';errorMsg.style.display='block';return;}
      try{
        const res=await fetch(API+'/api/videos',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
          body:JSON.stringify({title,youtubeUrl,creatorName:user.username})
        });
        const data=await res.json();
        if(!res.ok){errorMsg.textContent=data.msg||'Something went wrong';errorMsg.style.display='block';return;}
        closeModal();
        document.getElementById('videoTitle').value='';
        document.getElementById('videoUrl').value='';
        showToast('Video submitted! 🎬');
        loadVideos();
      }catch{errorMsg.textContent='Cannot connect to server';errorMsg.style.display='block';}
    }

    function logout(){
      localStorage.removeItem('cheka_token');
      localStorage.removeItem('cheka_user');
      window.location.href='index.html';
    }

    loadVideos();
  </script>
</body>
</html>
