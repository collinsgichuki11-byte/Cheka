<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch — Cheka</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    .feed-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .feed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .feed-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
    }
    .submit-btn {
      background: #e63212;
      color: #f5f5f5;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .video-card {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
      cursor: pointer;
    }
    .video-card:hover { border-color: #e63212; }
    .video-thumb {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }
    .video-thumb iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .video-details {
      padding: 1rem;
    }
    .video-details h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .video-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
    }
    .creator-tag {
      color: #1db954;
      font-size: 0.75rem;
    }
    .like-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #f5f5f5;
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .like-btn:hover { border-color: #e63212; color: #e63212; }
    /* Submit Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1.5rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 460px;
    }
    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      color: #f5f5f5;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      outline: none;
    }
    .form-group input:focus { border-color: #e63212; }
    .modal-btns {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .modal-submit {
      flex: 1;
      background: #e63212;
      color: #f5f5f5;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-cancel {
      background: transparent;
      color: #888;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.85rem 1.2rem;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #888;
    }
    .empty-state h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #f5f5f5;
    }
    .error-msg {
      background: rgba(230,50,18,0.1);
      border: 1px solid rgba(230,50,18,0.3);
      color: #e63212;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    .loading {
      text-align: center;
      padding: 4rem;
      color: #888;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit;">😂 Cheka</a></div>
    <div class="nav-links">
      <a href="feed.html">Watch</a>
      <span id="navUser" style="color:#888;font-size:0.85rem;"></span>
      <a href="#" onclick="logout()" style="color:#e63212;">Logout</a>
    </div>
  </nav>

  <div class="feed-container">
    <div class="feed-header">
      <h1>😂 What's Funny Today</h1>
      <button class="submit-btn" onclick="openModal()">+ Submit Video</button>
    </div>
    <div id="videoGrid" class="video-grid">
      <div class="loading">Loading funny content... 😂</div>
    </div>
  </div>

  <!-- Submit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Submit a Video 🎬</h2>
      <div class="error-msg" id="modalError"></div>
      <div class="form-group">
        <label>Video Title</label>
        <input type="text" id="videoTitle" placeholder="e.g. When matatu conductor..."/>
      </div>
      <div class="form-group">
        <label>YouTube URL</label>
        <input type="text" id="videoUrl" placeholder="https://youtube.com/watch?v=..."/>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-submit" onclick="submitVideo()">Submit</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://cheka-backend.onrender.com';
    const token = localStorage.getItem('cheka_token');
    const user = JSON.parse(localStorage.getItem('cheka_user') || '{}');

    if (!token) window.location.href = 'login.html';

    document.getElementById('navUser').textContent = user.username ? `@${user.username}` : '';

    async function loadVideos() {
      try {
        const res = await fetch(`${API}/api/videos`);
        const videos = await res.json();
        const grid = document.getElementById('videoGrid');

        if (videos.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <h2>No videos yet 😅</h2>
              <p>Be the first to submit a funny video!</p>
            </div>`;
          return;
        }

        grid.innerHTML = videos.map(v => `
          <div class="video-card">
            <div class="video-thumb">
              <iframe src="https://www.youtube.com/embed/${v.youtubeId}"
                allowfullscreen loading="lazy"></iframe>
            </div>
            <div class="video-details">
              <h3>${v.title}</h3>
              <div class="video-meta">
                <span class="creator-tag">@${v.creatorName}</span>
                <button class="like-btn" onclick="likeVideo('${v._id}', this)">
                  ❤️ ${v.likes}
                </button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('videoGrid').innerHTML =
          '<div class="loading">Could not load videos. Try again.</div>';
      }
    }

    async function likeVideo(id, btn) {
      try {
        const res = await fetch(`${API}/api/videos/${id}/like`, { method: 'POST' });
        const data = await res.json();
        btn.textContent = `❤️ ${data.likes}`;
      } catch (err) {}
    }

    function openModal() {
      if (!token) { window.location.href = 'login.html'; return; }
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.getElementById('modalError').style.display = 'none';
    }

    async function submitVideo() {
      const title = document.getElementById('videoTitle').value.trim();
      const youtubeUrl = document.getElementById('videoUrl').value.trim();
      const errorMsg = document.getElementById('modalError');

      errorMsg.style.display = 'none';

      if (!title || !youtubeUrl) {
        errorMsg.textContent = 'Please fill in all fields';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`${API}/api/videos`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ title, youtubeUrl, creatorName: user.username })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.msg || 'Something went wrong';
          errorMsg.style.display = 'block';
          return;
        }

        closeModal();
        document.getElementById('videoTitle').value = '';
        document.getElementById('videoUrl').value = '';
        loadVideos();

      } catch (err) {
        errorMsg.textContent = 'Cannot connect to server';
        errorMsg.style.display = 'block';
      }
    }

    function logout() {
      localStorage.removeItem('cheka_token');
      localStorage.removeItem('cheka_user');
      window.location.href = 'index.html';
    }

    loadVideos();
  </script>
</body>
</html>
