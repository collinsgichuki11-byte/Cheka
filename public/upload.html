<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload — Cheka</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    .container{max-width:600px;margin:0 auto;padding:2rem 1.5rem}
    .back-btn{display:inline-block;color:#888;text-decoration:none;font-size:.85rem;margin-bottom:1.5rem}
    .page-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:900;margin-bottom:.5rem}
    .page-sub{color:#888;font-size:.85rem;margin-bottom:2rem}
    .upload-tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid #2a2a2a}
    .upload-tab{background:transparent;border:none;color:#888;padding:.75rem 1.5rem;font-family:'Space Mono',monospace;font-size:.85rem;cursor:pointer;border-bottom:2px solid transparent;touch-action:manipulation}
    .upload-tab.active{color:#f5f5f5;border-bottom-color:#e63212}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .form-group{margin-bottom:1.5rem}
    .form-group label{display:block;font-size:.8rem;color:#888;margin-bottom:.5rem}
    .form-group input,.form-group select,.form-group textarea{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:.85rem 1rem;color:#f5f5f5;font-family:'Space Mono',monospace;font-size:.85rem;outline:none;box-sizing:border-box}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#e63212}
    .form-group select option{background:#111}
    .upload-area{width:100%;background:#111;border:2px dashed #2a2a2a;border-radius:12px;padding:3rem 1rem;text-align:center;cursor:pointer;transition:border-color .2s;box-sizing:border-box}
    .upload-area:hover{border-color:#e63212}
    .upload-area.dragover{border-color:#e63212;background:#1a0a08}
    .upload-area h3{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:900;margin-bottom:.5rem}
    .upload-area p{color:#888;font-size:.8rem}
    .upload-area input{display:none}
    .file-selected{background:#1a1a1a;border:1px solid #1db954;border-radius:8px;padding:1rem;margin-top:1rem;display:none}
    .file-selected p{color:#1db954;font-size:.85rem;margin:0}
    .progress-bar{width:100%;background:#1a1a1a;border-radius:8px;height:8px;margin-top:1rem;display:none;overflow:hidden}
    .progress-fill{height:100%;background:#e63212;border-radius:8px;width:0%;transition:width .3s}
    .submit-btn{width:100%;background:#e63212;color:#f5f5f5;border:none;border-radius:8px;padding:1rem;font-family:'Space Mono',monospace;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:.5rem;touch-action:manipulation}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed}
    .error-msg{background:rgba(230,50,18,.1);border:1px solid rgba(230,50,18,.3);color:#e63212;padding:.75rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;display:none}
    .success-msg{background:rgba(29,185,84,.1);border:1px solid rgba(29,185,84,.3);color:#1db954;padding:.75rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;display:none}
    .preview-video{width:100%;border-radius:8px;margin-top:1rem;display:none;max-height:300px}
  </style>
</head>
<body>
  <nav>
    <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit;">😂 Cheka</a></div>
    <div class="nav-links">
      <a href="feed.html">Watch</a>
      <a href="creators.html">Creators</a>
      <a href="profile.html" id="navUser" style="color:#1db954;"></a>
      <a href="#" onclick="logout();return false;" style="color:#e63212;">Logout</a>
    </div>
  </nav>

  <div class="container">
    <a href="feed.html" class="back-btn">← Back to Feed</a>
    <h1 class="page-title">🎬 Upload Video</h1>
    <p class="page-sub">Share your funny content with Kenya</p>

    <div class="upload-tabs">
      <button class="upload-tab active" onclick="switchTab('direct')">📱 Upload Video</button>
      <button class="upload-tab" onclick="switchTab('youtube')">▶️ YouTube Link</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- Direct Upload Tab -->
    <div class="tab-content active" id="tab-direct">
      <div class="form-group">
        <label>Video Title</label>
        <input type="text" id="directTitle" placeholder="e.g. When matatu conductor..."/>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="directCategory">
          <option value="General">General</option>
          <option value="Comedy">😂 Comedy</option>
          <option value="Skits">🎭 Skits</option>
          <option value="Memes">🤣 Memes</option>
          <option value="Roasts">🔥 Roasts</option>
          <option value="Standup">🎤 Standup</option>
        </select>
      </div>
      <div class="form-group">
        <label>Video File</label>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('videoFile').click()">
          <div style="font-size:3rem;margin-bottom:.75rem">🎬</div>
          <h3>Tap to select video</h3>
          <p>MP4, MOV, AVI supported • Max 100MB</p>
          <input type="file" id="videoFile" accept="video/*" onchange="fileSelected(this)"/>
        </div>
        <div class="file-selected" id="fileSelected">
          <p id="fileName">No file selected</p>
        </div>
        <video class="preview-video" id="previewVideo" controls></video>
      </div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <button class="submit-btn" id="uploadBtn" onclick="uploadVideo()">🚀 Upload & Post</button>
    </div>

    <!-- YouTube Tab -->
    <div class="tab-content" id="tab-youtube">
      <div class="form-group">
        <label>Video Title</label>
        <input type="text" id="ytTitle" placeholder="e.g. When matatu conductor..."/>
      </div>
      <div class="form-group">
        <label>YouTube URL</label>
        <input type="text" id="ytUrl" placeholder="https://youtube.com/watch?v=..."/>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="ytCategory">
          <option value="General">General</option>
          <option value="Comedy">😂 Comedy</option>
          <option value="Skits">🎭 Skits</option>
          <option value="Memes">🤣 Memes</option>
          <option value="Roasts">🔥 Roasts</option>
          <option value="Standup">🎤 Standup</option>
        </select>
      </div>
      <button class="submit-btn" id="ytBtn" onclick="submitYoutube()">🚀 Post Video</button>
    </div>
  </div>

  <script>
    const API='https://cheka-backend.onrender.com';
    const CLOUD='dn2k94te1';
    const token=localStorage.getItem('cheka_token');
    const user=JSON.parse(localStorage.getItem('cheka_user')||'{}');

    if(!token)window.location.href='login.html';
    document.getElementById('navUser').textContent=user.username?'@'+user.username:'';

    function switchTab(tab){
      document.querySelectorAll('.upload-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
      document.getElementById('tab-'+tab).classList.add('active');
      event.target.classList.add('active');
    }

    function fileSelected(input){
      const file=input.files[0];
      if(!file)return;
      document.getElementById('fileName').textContent=file.name+' ('+Math.round(file.size/1024/1024*10)/10+'MB)';
      document.getElementById('fileSelected').style.display='block';
      const preview=document.getElementById('previewVideo');
      preview.src=URL.createObjectURL(file);
      preview.style.display='block';
    }

    async function uploadVideo(){
      const title=document.getElementById('directTitle').value.trim();
      const category=document.getElementById('directCategory').value;
      const file=document.getElementById('videoFile').files[0];
      const err=document.getElementById('errorMsg');
      const succ=document.getElementById('successMsg');
      err.style.display='none';succ.style.display='none';

      if(!title){err.textContent='Please add a title';err.style.display='block';return;}
      if(!file){err.textContent='Please select a video file';err.style.display='block';return;}
      if(file.size>100*1024*1024){err.textContent='File too large. Max 100MB';err.style.display='block';return;}

      const btn=document.getElementById('uploadBtn');
      btn.disabled=true;
      btn.textContent='Uploading...';

      try{
        // Upload directly to Cloudinary unsigned
        const formData=new FormData();
        formData.append('file',file);
        formData.append('upload_preset','cheka_videos');
        formData.append('folder','cheka_videos');

        document.getElementById('progressBar').style.display='block';

        const xhr=new XMLHttpRequest();
        xhr.open('POST',`https://api.cloudinary.com/v1_1/${CLOUD}/video/upload`);

        xhr.upload.onprogress=e=>{
          if(e.lengthComputable){
            const pct=Math.round(e.loaded/e.total*100);
            document.getElementById('progressFill').style.width=pct+'%';
            btn.textContent=`Uploading ${pct}%...`;
          }
        };

        xhr.onload=async()=>{
          if(xhr.status===200){
            const data=JSON.parse(xhr.responseText);
            const videoUrl=data.secure_url;

            // Save to Cheka backend
            const postRes=await fetch(API+'/api/videos',{
              method:'POST',
              headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
              body:JSON.stringify({
                title,
                videoUrl,
                category,
                creatorName:user.username,
                youtubeUrl:''
              })
            });

            if(postRes.ok){
              succ.textContent='Video uploaded successfully! 🎉';
              succ.style.display='block';
              btn.textContent='✅ Posted!';
              setTimeout(()=>window.location.href='feed.html',2000);
            }else{
              throw new Error('Failed to save video');
            }
          }else{
            throw new Error('Upload failed');
          }
        };

        // Timeout after 3 minutes
        xhr.timeout = 180000;
        xhr.ontimeout=()=>{
          err.textContent='Upload timed out. Try a smaller video or check connection.';
          err.style.display='block';
          btn.disabled=false;
          btn.textContent='🚀 Upload & Post';
          document.getElementById('progressBar').style.display='none';
        };

        xhr.onerror=()=>{
          err.textContent='Upload failed. Check your connection.';
          err.style.display='block';
          btn.disabled=false;
          btn.textContent='🚀 Upload & Post';
        };

        xhr.send(formData);

      }catch(e){
        err.textContent=e.message||'Something went wrong';
        err.style.display='block';
        btn.disabled=false;
        btn.textContent='🚀 Upload & Post';
      }
    }

    async function submitYoutube(){
      const title=document.getElementById('ytTitle').value.trim();
      const youtubeUrl=document.getElementById('ytUrl').value.trim();
      const category=document.getElementById('ytCategory').value;
      const err=document.getElementById('errorMsg');
      const succ=document.getElementById('successMsg');
      err.style.display='none';succ.style.display='none';

      if(!title||!youtubeUrl){err.textContent='Please fill in all fields';err.style.display='block';return;}

      const btn=document.getElementById('ytBtn');
      btn.disabled=true;btn.textContent='Posting...';

      try{
        const res=await fetch(API+'/api/videos',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
          body:JSON.stringify({title,youtubeUrl,category,creatorName:user.username})
        });
        const data=await res.json();
        if(!res.ok){err.textContent=data.msg||'Something went wrong';err.style.display='block';btn.disabled=false;btn.textContent='🚀 Post Video';return;}
        succ.textContent='Video posted! 🎉';
        succ.style.display='block';
        setTimeout(()=>window.location.href='feed.html',2000);
      }catch{
        err.textContent='Cannot connect to server';
        err.style.display='block';
        btn.disabled=false;
        btn.textContent='🚀 Post Video';
      }
    }

    function logout(){
      localStorage.removeItem('cheka_token');
      localStorage.removeItem('cheka_user');
      window.location.href='index.html';
    }
  </script>
</body>
</html>
