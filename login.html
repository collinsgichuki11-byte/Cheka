<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Cheka</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 2rem;
      display: block;
      text-decoration: none;
      color: #f5f5f5;
    }
    .auth-box h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }
    .auth-box p {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      color: #f5f5f5;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #e63212;
    }
    .auth-btn {
      width: 100%;
      background: #e63212;
      color: #f5f5f5;
      border: none;
      border-radius: 8px;
      padding: 0.9rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-switch {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #888;
    }
    .auth-switch a { color: #e63212; text-decoration: none; }
    .error-msg {
      background: rgba(230,50,18,0.1);
      border: 1px solid rgba(230,50,18,0.3);
      color: #e63212;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    .success-msg {
      background: rgba(29,185,84,0.1);
      border: 1px solid rgba(29,185,84,0.3);
      color: #1db954;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <a href="index.html" class="auth-logo">😂 Cheka</a>
      <h1>Welcome back</h1>
      <p>Log in to your Cheka account</p>
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="your password"/>
      </div>
      <button class="auth-btn" id="loginBtn" onclick="login()">Log In</button>
      <div class="auth-switch">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </div>
    </div>
  </div>
  <script>
    const API = 'https://cheka-backend.onrender.com';

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.msg || 'Invalid credentials';
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Log In';
          return;
        }

        localStorage.setItem('cheka_token', data.token);
        localStorage.setItem('cheka_user', JSON.stringify(data.user));

        successMsg.textContent = 'Welcome back! Redirecting...';
        successMsg.style.display = 'block';

        setTimeout(() => { window.location.href = 'index.html'; }, 1500);

      } catch (err) {
        errorMsg.textContent = 'Cannot connect to server. Try again.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    }
  </script>
</body>
</html>
