<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications — Cheka</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    .container{max-width:600px;margin:0 auto;padding:2rem 1.5rem}
    .back-btn{display:inline-block;color:#888;text-decoration:none;font-size:.85rem;margin-bottom:1.5rem}
    .page-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:900;margin-bottom:.5rem}
    .mark-read{background:transparent;border:1px solid #2a2a2a;color:#888;border-radius:8px;padding:.4rem 1rem;font-family:'Space Mono',monospace;font-size:.75rem;cursor:pointer;margin-bottom:1.5rem;display:block}
    .mark-read:hover{border-color:#f5f5f5;color:#f5f5f5}
    .notif-item{background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:1rem 1.25rem;margin-bottom:.75rem;display:flex;align-items:flex-start;gap:1rem;transition:border-color .2s}
    .notif-item.unread{border-color:#e63212;background:#1a0a08}
    .notif-icon{font-size:1.5rem;flex-shrink:0;margin-top:.1rem}
    .notif-body{}
    .notif-text{font-size:.85rem;color:#f5f5f5;line-height:1.5;margin-bottom:.25rem}
    .notif-text strong{color:#1db954}
    .notif-time{font-size:.7rem;color:#555}
    .notif-dot{width:8px;height:8px;background:#e63212;border-radius:50%;flex-shrink:0;margin-top:.4rem}
    .empty{text-align:center;padding:4rem;color:#888}
    .empty h2{font-family:'Syne',sans-serif;color:#f5f5f5;margin-bottom:.5rem;font-size:1.5rem}
    .loading{text-align:center;padding:4rem;color:#888;font-size:.85rem}
  </style>
</head>
<body>
  <nav>
    <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit;">😂 Cheka</a></div>
    <div class="nav-links">
      <a href="feed.html">Watch</a>
      <a href="creators.html">Creators</a>
      <a href="profile.html" id="navUser" style="color:#1db954;"></a>
      <a href="#" onclick="logout();return false;" style="color:#e63212;">Logout</a>
    </div>
  </nav>

  <div class="container">
    <a href="feed.html" class="back-btn">← Back to Feed</a>
    <h1 class="page-title">🔔 Notifications</h1>
    <button class="mark-read" onclick="markAllRead()">✓ Mark all as read</button>
    <div id="notifList"><div class="loading">Loading...</div></div>
  </div>

  <script>
    const API='https://cheka-backend.onrender.com';
    const token=localStorage.getItem('cheka_token');
    const user=JSON.parse(localStorage.getItem('cheka_user')||'{}');

    if(!token)window.location.href='login.html';
    document.getElementById('navUser').textContent=user.username?'@'+user.username:'';

    function timeAgo(d){
      const s=(Date.now()-new Date(d))/1000;
      if(s<60)return 'just now';
      if(s<3600)return Math.floor(s/60)+'m ago';
      if(s<86400)return Math.floor(s/3600)+'h ago';
      return Math.floor(s/86400)+'d ago';
    }

    async function loadNotifs(){
      try{
        const res=await fetch(API+'/api/notifications',{
          headers:{'Authorization':'Bearer '+token}
        });
        const notifs=await res.json();
        const list=document.getElementById('notifList');
        if(!notifs.length){
          list.innerHTML='<div class="empty"><h2>No notifications yet 🔔</h2><p>When someone likes or comments on your video you will see it here.</p></div>';
          return;
        }
        list.innerHTML=notifs.map(n=>`
          <div class="notif-item ${n.read?'':'unread'}">
            <div class="notif-icon">${n.type==='like'?'❤️':'💬'}</div>
            <div class="notif-body">
              <div class="notif-text">
                <strong>@${n.sender}</strong> ${n.type==='like'?'liked':'commented on'} your video <strong>"${n.videoTitle}"</strong>
              </div>
              <div class="notif-time">${timeAgo(n.createdAt)}</div>
            </div>
            ${n.read?'':'<div class="notif-dot"></div>'}
          </div>
        `).join('');
      }catch{
        document.getElementById('notifList').innerHTML='<div class="loading">Could not load notifications.</div>';
      }
    }

    async function markAllRead(){
      try{
        await fetch(API+'/api/notifications/read',{
          method:'PUT',
          headers:{'Authorization':'Bearer '+token}
        });
        loadNotifs();
      }catch{}
    }

    function logout(){
      localStorage.removeItem('cheka_token');
      localStorage.removeItem('cheka_user');
      window.location.href='index.html';
    }

    loadNotifs();
  </script>
</body>
</html>
