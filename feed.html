<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Watch — Cheka</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;width:100%;overflow:hidden;background:#000;font-family:'Space Mono',monospace}
    /* FEED */
    .feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
    .feed::-webkit-scrollbar{display:none}
    .slide{height:100vh;width:100vw;scroll-snap-align:start;position:relative;background:#000;flex-shrink:0}
    .slide video,.slide iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;object-fit:cover}
    /* FIXED UI */
    .top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);pointer-events:none}
    .top-bar a,.top-bar button{pointer-events:all}
    .top-logo{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:900;color:#f5f5f5;text-decoration:none}
    .top-right{display:flex;align-items:center;gap:1rem}
    .top-right a{color:#f5f5f5;text-decoration:none;font-size:.75rem;font-family:'Space Mono',monospace}
    .top-right a.green{color:#1db954}
    .top-right a.red{color:#e63212}
    .cats{position:fixed;top:3rem;left:0;right:0;z-index:100;display:flex;gap:.5rem;overflow-x:auto;padding:.5rem 1rem;scrollbar-width:none;pointer-events:none}
    .cats::-webkit-scrollbar{display:none}
    .cat{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.25);color:#f5f5f5;border-radius:20px;padding:.3rem .85rem;font-size:.7rem;cursor:pointer;white-space:nowrap;backdrop-filter:blur(4px);touch-action:manipulation;pointer-events:all}
    .cat.active{background:#e63212;border-color:#e63212}
    /* FIXED ACTIONS */
    .actions{position:fixed;right:.75rem;bottom:4.5rem;z-index:100;display:flex;flex-direction:column;align-items:center;gap:1.2rem}
    .act{display:flex;flex-direction:column;align-items:center;gap:.25rem;cursor:pointer;touch-action:manipulation}
    .act .icon{font-size:1.6rem;line-height:1}
    .act .label{color:#f5f5f5;font-size:.65rem;text-align:center}
    .act.liked .icon{filter:drop-shadow(0 0 8px #e63212)}
    /* FIXED CAPTION */
    .caption{position:fixed;bottom:4.5rem;left:1rem;right:4.5rem;z-index:100;pointer-events:none}
    .caption-cat{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#f5f5f5;border-radius:20px;padding:.15rem .6rem;font-size:.7rem;margin-bottom:.4rem}
    .caption-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:900;color:#f5f5f5;margin-bottom:.3rem;line-height:1.3}
    .caption-meta{color:rgba(255,255,255,.7);font-size:.75rem}
    /* BOTTOM BAR */
    .bot-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-around;align-items:center;padding:.6rem 1rem .8rem;background:linear-gradient(to top,rgba(0,0,0,.7),transparent)}
    .bot-btn{display:flex;flex-direction:column;align-items:center;gap:.2rem;text-decoration:none;color:rgba(255,255,255,.6);font-size:.6rem;touch-action:manipulation}
    .bot-btn.active{color:#f5f5f5}
    .bot-btn .bicon{font-size:1.2rem}
    /* FAB */
    .fab{position:fixed;bottom:4.5rem;left:1rem;z-index:100;background:#e63212;border:none;border-radius:50%;width:44px;height:44px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;box-shadow:0 4px 15px rgba(230,50,18,.5)}
    /* GRADIENTS ON SLIDE */
    .slide-top-grad{position:absolute;top:0;left:0;right:0;height:160px;background:linear-gradient(to bottom,rgba(0,0,0,.95) 0%,rgba(0,0,0,.7) 60%,transparent 100%);z-index:2;pointer-events:none}
    .slide-bot-grad{position:absolute;bottom:0;left:0;right:0;height:200px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);z-index:2;pointer-events:none}
    /* COMMENTS */
    .cm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:2000;display:none;flex-direction:column}
    .cm-overlay.open{display:flex}
    .cm-header{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.5rem;border-bottom:1px solid #2a2a2a;flex-shrink:0}
    .cm-header h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:900;color:#f5f5f5}
    .cm-close{background:#2a2a2a;border:none;color:#f5f5f5;border-radius:8px;padding:.4rem .9rem;font-family:'Space Mono',monospace;cursor:pointer;font-size:.8rem;touch-action:manipulation}
    .cm-list{flex:1;overflow-y:auto;padding:1rem 1.5rem}
    .cm-input-area{padding:1rem 1.5rem;border-top:1px solid #2a2a2a;background:#0a0a0a;flex-shrink:0}
    .cm-row{display:flex;gap:.5rem}
    .cm-input{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:.75rem 1rem;color:#f5f5f5;font-family:'Space Mono',monospace;font-size:.85rem;outline:none;min-width:0}
    .cm-input:focus{border-color:#e63212}
    .cm-send{background:#e63212;color:#f5f5f5;border:none;border-radius:8px;padding:.75rem 1.1rem;font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;cursor:pointer;touch-action:manipulation;flex-shrink:0}
    .c-item{margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px solid #1f1f1f}
    .c-item:last-child{border-bottom:none}
    .c-author{color:#1db954;font-size:.75rem;margin-bottom:.2rem}
    .c-text{font-size:.85rem;color:#f5f5f5;line-height:1.5}
    .c-time{font-size:.65rem;color:#555;margin-top:.2rem}
    .no-c{color:#555;font-size:.8rem;text-align:center;padding:2rem}
    /* TOAST */
    .toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#1db954;color:#000;padding:.65rem 1.4rem;border-radius:8px;font-size:.8rem;font-weight:700;display:none;z-index:9999;white-space:nowrap}
    .toast.show{display:block}
    /* LOADER */
    .loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:5000;flex-direction:column;gap:1rem}
    .loader h2{font-family:'Syne',sans-serif;font-size:2rem;font-weight:900;color:#f5f5f5}
    .loader p{color:#888;font-size:.8rem}
  </style>
</head>
<body>

<div class="loader" id="loader">
  <h2>😂 Cheka</h2>
  <p>Loading funny content...</p>
</div>

<!-- FIXED TOP BAR -->
<div class="top-bar">
  <a href="index.html" class="top-logo">😂 Cheka</a>
  <div class="top-right">
    <a href="feed.html">Watch</a>
    <a href="creators.html">Creators</a>
    <a href="notifications.html">🔔</a>
    <a href="profile.html" class="green" id="navUser"></a>
    <a href="#" class="red" onclick="logout();return false;">Logout</a>
  </div>
</div>

<!-- FIXED CATEGORIES -->
<div class="cats" id="catsBar">
  <button class="cat active" onclick="setCat('',this)">All</button>
  <button class="cat" onclick="setCat('Comedy',this)">😂 Comedy</button>
  <button class="cat" onclick="setCat('Skits',this)">🎭 Skits</button>
  <button class="cat" onclick="setCat('Memes',this)">🤣 Memes</button>
  <button class="cat" onclick="setCat('Roasts',this)">🔥 Roasts</button>
  <button class="cat" onclick="setCat('Standup',this)">🎤 Standup</button>
</div>

<!-- FIXED CAPTION -->
<div class="caption" id="caption">
  <div class="caption-cat" id="capCat"></div>
  <div class="caption-title" id="capTitle"></div>
  <div class="caption-meta" id="capMeta"></div>
</div>

<!-- FIXED ACTIONS -->
<div class="actions" id="actions">
  <div class="act" id="likeAct" onclick="likeCurrentVideo()">
    <span class="icon" id="likeIcon">🤍</span>
    <span class="label" id="likeCount">0</span>
  </div>
  <div class="act" onclick="openComments()">
    <span class="icon">💬</span>
    <span class="label">Comment</span>
  </div>
  <div class="act" onclick="shareCurrentVideo()">
    <span class="icon">🔗</span>
    <span class="label">Share</span>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="window.location.href='upload.html'">+</button>

<!-- BOTTOM BAR -->
<div class="bot-bar">
  <a href="index.html" class="bot-btn"><span class="bicon">🏠</span><span>Home</span></a>
  <a href="feed.html" class="bot-btn active"><span class="bicon">😂</span><span>Watch</span></a>
  <a href="profile.html" class="bot-btn"><span class="bicon">👤</span><span>Profile</span></a>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

<!-- COMMENTS -->
<div class="cm-overlay" id="cmOverlay">
  <div class="cm-header">
    <h2>💬 Comments</h2>
    <button class="cm-close" onclick="closeComments()">✕ Close</button>
  </div>
  <div class="cm-list" id="cmList"><div class="no-c">Loading...</div></div>
  <div class="cm-input-area">
    <div class="cm-row">
      <input class="cm-input" id="cmInput" type="text" placeholder="Say something funny..."/>
      <button class="cm-send" id="cmSend">Send</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='https://cheka-backend.onrender.com';
const token=localStorage.getItem('cheka_token');
const user=JSON.parse(localStorage.getItem('cheka_user')||'{}');
let videos=[];
let currentIndex=0;
let currentCat='';
const liked=new Set(JSON.parse(localStorage.getItem('cheka_liked')||'[]'));

if(!token)window.location.href='login.html';
document.getElementById('navUser').textContent=user.username?'@'+user.username:'';

document.getElementById('cmSend').addEventListener('click',sendComment);
document.getElementById('cmInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendComment();});

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function timeAgo(d){
  const s=(Date.now()-new Date(d))/1000;
  if(s<60)return 'just now';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function getPlayer(v){
  if(v.videoType==="direct"&&v.videoUrl){
    return '<video src="'+v.videoUrl+'" controls playsinline style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;background:#000"></video>';
  }
  return '<iframe src="https://www.youtube.com/embed/'+v.youtubeId+'?autoplay=0" allowfullscreen loading="lazy"></iframe>';
}

async function load(){
  try{
    const url=API+'/api/videos'+(currentCat?'?category='+currentCat:'');
    const res=await fetch(url);
    videos=await res.json();
    renderFeed();
  }catch{
    document.getElementById('feed').innerHTML='<div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#888;font-size:.85rem">Could not load videos</div>';
  }finally{
    document.getElementById('loader').style.display='none';
  }
}

function renderFeed(){
  const feed=document.getElementById('feed');
  if(!videos.length){
    feed.innerHTML='<div class="slide" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;color:#888"><div style="font-size:3rem">😅</div><div>No videos yet!</div></div>';
    updateUI(null);
    return;
  }
  feed.innerHTML=videos.map(v=>`
    <div class="slide" id="s-${v._id}">
      ${getPlayer(v)}
      <div class="slide-top-grad"></div>
      <div class="slide-bot-grad"></div>
    </div>
  `).join('');

  // Set up scroll observer
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const id=entry.target.id.replace('s-','');
        const idx=videos.findIndex(v=>v._id===id);
        if(idx>=0){
          currentIndex=idx;
          updateUI(videos[idx]);
          // Track view
          fetch(API+'/api/videos/'+id+'/view',{method:'POST'}).catch(()=>{});
        }
      }
    });
  },{threshold:0.6});

  document.querySelectorAll('.slide').forEach(s=>observer.observe(s));
  updateUI(videos[0]);
}

function updateUI(v){
  if(!v){
    document.getElementById('capTitle').textContent='';
    document.getElementById('capMeta').textContent='';
    document.getElementById('capCat').textContent='';
    return;
  }
  document.getElementById('capCat').textContent=v.category||'General';
  document.getElementById('capTitle').textContent=v.title;
  document.getElementById('capMeta').textContent='@'+v.creatorName+' • 👁 '+(v.views||0)+' views';
  
  const isLiked=liked.has(v._id);
  document.getElementById('likeIcon').textContent=isLiked?'❤️':'🤍';
  document.getElementById('likeCount').textContent=v.likes||0;
  const likeAct=document.getElementById('likeAct');
  if(isLiked)likeAct.classList.add('liked');
  else likeAct.classList.remove('liked');
}

function setCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('loader').style.display='flex';
  load();
}

async function likeCurrentVideo(){
  if(!videos.length)return;
  const v=videos[currentIndex];
  try{
    const res=await fetch(API+'/api/videos/'+v._id+'/like',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({userId:user.id})
    });
    const data=await res.json();
    if(data.liked){liked.add(v._id);v.likes=data.likes;}
    else{liked.delete(v._id);v.likes=data.likes;}
    localStorage.setItem('cheka_liked',JSON.stringify([...liked]));
    updateUI(v);
  }catch{}
}

function openComments(){
  if(!videos.length)return;
  const v=videos[currentIndex];
  document.getElementById('cmOverlay').classList.add('open');
  document.getElementById('cmInput').value='';
  document.getElementById('cmList').innerHTML='<div class="no-c">Loading...</div>';
  loadComments(v._id);
}

function closeComments(){
  document.getElementById('cmOverlay').classList.remove('open');
}

async function loadComments(videoId){
  try{
    const res=await fetch(API+'/api/comments/'+videoId);
    const comments=await res.json();
    const list=document.getElementById('cmList');
    if(!comments.length){list.innerHTML='<div class="no-c">No comments yet. Be first! 😄</div>';return;}
    list.innerHTML=comments.map(c=>`
      <div class="c-item">
        <div class="c-author">@${c.username}</div>
        <div class="c-text">${c.text}</div>
        <div class="c-time">${timeAgo(c.createdAt)}</div>
      </div>
    `).join('');
  }catch{}
}

async function sendComment(){
  if(!videos.length)return;
  const v=videos[currentIndex];
  const input=document.getElementById('cmInput');
  const text=input.value.trim();
  if(!text){toast('Type something first 😄');return;}
  try{
    const res=await fetch(API+'/api/comments/'+v._id,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({text,username:user.username})
    });
    if(res.ok){input.value='';await loadComments(v._id);toast('Comment posted! 😄');}
  }catch{toast('Could not post comment');}
}

function shareCurrentVideo(){
  if(!videos.length)return;
  const v=videos[currentIndex];
  const url=window.location.origin+'/feed.html#'+v._id;
  if(navigator.share)navigator.share({title:'Cheka: '+v.title,url});
  else{navigator.clipboard.writeText(url);toast('Link copied! 🔗');}
}

function logout(){
  localStorage.removeItem('cheka_token');
  localStorage.removeItem('cheka_user');
  window.location.href='index.html';
}

load();
</script>
</body>
</html>
